<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remote Hustle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex;
           align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; padding: 60px; border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1); text-align: center; max-width: 600px; }
    h1 { color: #1F4E79; font-size: 2.5rem; margin-bottom: 16px; }
    p  { color: #555; font-size: 1.1rem; line-height: 1.6; margin-bottom: 12px; }
    .badge { display:inline-block; background:#2E75B6; color:white;
             padding:6px 18px; border-radius:20px; font-size:0.9rem; margin-top:20px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Remote Hustle</h1>
    <p>Building the future of remote work — one opportunity at a time.</p>
    <p>Our platform connects talented professionals with global opportunities.</p>
    <span class="badge">Infrastructure Live ✅</span>
  </div>
</body>
</html>
